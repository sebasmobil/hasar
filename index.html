<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Türkiye Haber Takibi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f1;
      --surface: #ffffff;
      --surface2: #f1efea;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --text: #1a1a18;
      --text2: #5a5a57;
      --text3: #9a9a96;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #242422;
        --surface2: #2e2e2b;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.2);
        --text: #f0ede8;
        --text2: #a8a8a4;
        --text3: #686864;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      padding: 1rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e24b4a;
      animation: pulse 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 7px 12px;
      flex: 1;
      max-width: 320px;
    }

    .search-wrap input {
      border: none;
      background: transparent;
      font-size: 14px;
      color: var(--text);
      width: 100%;
      outline: none;
    }

    .search-wrap input::placeholder { color: var(--text3); }

    .search-icon { color: var(--text3); flex-shrink: 0; }

    .main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem; }

    .channels-scroll {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .ch-btn {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 0.5px solid var(--border2);
      background: var(--surface);
      color: var(--text2);
      transition: all 0.15s;
      white-space: nowrap;
    }

    .ch-btn:hover { background: var(--surface2); color: var(--text); }
    .ch-btn.active { color: #fff !important; border-color: transparent !important; }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stats { font-size: 13px; color: var(--text3); }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border2);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
    }

    .refresh-btn:hover { background: var(--surface2); color: var(--text); }
    .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s, transform 0.1s;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      border-color: var(--border2);
      transform: translateY(-1px);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 6px;
      letter-spacing: 0.2px;
    }

    .card-time {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text);
    }

    .card-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      margin-top: auto;
      padding-top: 4px;
      font-size: 12px;
      font-weight: 500;
      color: #185FA5;
    }

    .placeholder {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text3);
      font-size: 15px;
    }

    .loading-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    .skeleton {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sk {
      background: var(--surface2);
      border-radius: 6px;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 12px;
      color: var(--text3);
      border-top: 0.5px solid var(--border);
      margin-top: 3rem;
    }

    @media (max-width: 600px) {
      .header-inner { flex-direction: column; align-items: stretch; }
      .search-wrap { max-width: 100%; }
      .logo { font-size: 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="live-dot"></span>
      Türkiye Haber Takibi
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Haberlerde ara..." oninput="filterAndRender()" />
    </div>
  </div>
</header>

<main class="main">
  <div class="channels-scroll" id="channelButtons"></div>

  <div class="toolbar">
    <div class="stats" id="statsBar">Haberler yükleniyor...</div>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchAllNews()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M3 21v-5h5"/>
      </svg>
      Yenile
    </button>
  </div>

  <div id="newsContainer"></div>
</main>

<footer>
  Haberler her 5 dakikada bir otomatik güncellenir &bull; RSS kaynakları doğrudan kanallardan çekilir
</footer>

<script>
const CHANNELS = [
  { id: "ntv",        name: "NTV",        rss: "https://www.ntv.com.tr/son-dakika.rss",                     color: "#185FA5", bg: "#deeaf8", darkBg: "#0c3a6a", darkColor: "#85b7eb" },
  { id: "cnn",        name: "CNN Türk",   rss: "https://www.cnnturk.com/feed/rss/all/news",                 color: "#A32D2D", bg: "#fae0e0", darkBg: "#5a1a1a", darkColor: "#f09595" },
  { id: "hurriyet",   name: "Hürriyet",   rss: "https://www.hurriyet.com.tr/rss/anasayfa",                  color: "#854F0B", bg: "#faebd8", darkBg: "#4a2a06", darkColor: "#ef9f27" },
  { id: "milliyet",   name: "Milliyet",   rss: "https://www.milliyet.com.tr/rss/rssnew/gundemrss.xml",      color: "#3B6D11", bg: "#dff0cc", darkBg: "#1e3a08", darkColor: "#97c459" },
  { id: "sabah",      name: "Sabah",      rss: "https://www.sabah.com.tr/rss/anasakfa.xml",                 color: "#533AB7", bg: "#e8e6fa", darkBg: "#2d2070", darkColor: "#afa9ec" },
  { id: "haberturk",  name: "Habertürk",  rss: "https://www.haberturk.com/rss",                             color: "#0F6E56", bg: "#d5f0e8", darkBg: "#063d30", darkColor: "#5dcaa5" },
  { id: "sozcu",      name: "Sözcü",      rss: "https://www.sozcu.com.tr/rss.xml",                          color: "#993C1D", bg: "#f5e0d8", darkBg: "#521e0e", darkColor: "#f0997b" },
  { id: "cumhuriyet", name: "Cumhuriyet", rss: "https://www.cumhuriyet.com.tr/rss/son_dakika.xml",          color: "#4a4a46", bg: "#eceae4", darkBg: "#2a2a28", darkColor: "#b4b2a9" },
  { id: "aa",         name: "AA",         rss: "https://www.aa.com.tr/tr/rss/default?cat=guncel",           color: "#0c447c", bg: "#d8eaf8", darkBg: "#062c52", darkColor: "#85b7eb" },
  { id: "trt",        name: "TRT Haber",  rss: "https://www.trthaber.com/sondakika.rss",                    color: "#6e0f2a", bg: "#f5d8e0", darkBg: "#3d0616", darkColor: "#ed93b1" },
];

const PROXY = "https://api.allorigins.win/get?url=";
const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;

let allNews = [];
let activeChannel = "all";
let refreshTimer = null;

function renderChannelButtons() {
  const cont = document.getElementById("channelButtons");
  const allBtn = document.createElement("button");
  allBtn.className = "ch-btn active";
  allBtn.id = "btn-all";
  allBtn.textContent = "Tümü";
  allBtn.style.background = dark ? "#1d4a26" : "#3B6D11";
  allBtn.style.color = dark ? "#c0dd97" : "#fff";
  allBtn.onclick = () => setChannel("all");
  cont.appendChild(allBtn);

  CHANNELS.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "ch-btn";
    btn.id = "btn-" + c.id;
    btn.textContent = c.name;
    btn.onclick = () => setChannel(c.id);
    cont.appendChild(btn);
  });
}

function setChannel(id) {
  activeChannel = id;
  document.querySelectorAll(".ch-btn").forEach(b => {
    b.classList.remove("active");
    b.style.background = "";
    b.style.color = "";
  });

  const target = document.getElementById("btn-" + id);
  if (!target) return;
  target.classList.add("active");

  if (id === "all") {
    target.style.background = dark ? "#1d4a26" : "#3B6D11";
    target.style.color = dark ? "#c0dd97" : "#fff";
  } else {
    const ch = CHANNELS.find(c => c.id === id);
    if (ch) {
      target.style.background = dark ? ch.darkBg : ch.color;
      target.style.color = "#fff";
    }
  }
  filterAndRender();
}

function parseRSS(xml, channel) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xml, "text/xml");
    const items = Array.from(doc.querySelectorAll("item")).slice(0, 20);
    return items.map(item => {
      const title = item.querySelector("title")?.textContent?.trim() || "";
      let desc = item.querySelector("description")?.textContent?.replace(/<[^>]*>/g, "").replace(/&[^;]+;/g, " ").trim() || "";
      desc = desc.replace(/\s+/g, " ").slice(0, 300);
      const link = item.querySelector("link")?.textContent?.trim() ||
                   item.getElementsByTagNameNS("*", "origLink")[0]?.textContent?.trim() || "";
      const pubDate = item.querySelector("pubDate")?.textContent?.trim() ||
                      item.querySelector("pubdate")?.textContent?.trim() || "";
      return { title, desc, link, pubDate, channel };
    }).filter(n => n.title.length > 5);
  } catch {
    return [];
  }
}

function timeAgo(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr);
  if (isNaN(d)) return "";
  const diff = (Date.now() - d) / 1000;
  if (diff < 60) return "Az önce";
  if (diff < 3600) return Math.floor(diff / 60) + " dk önce";
  if (diff < 86400) return Math.floor(diff / 3600) + " saat önce";
  return Math.floor(diff / 86400) + " gün önce";
}

async function fetchChannel(channel) {
  try {
    const url = PROXY + encodeURIComponent(channel.rss);
    const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) return [];
    const json = await res.json();
    return parseRSS(json.contents || "", channel);
  } catch {
    return [];
  }
}

function showSkeletons() {
  const skels = Array.from({ length: 6 }, () => `
    <div class="skeleton">
      <div class="sk" style="height:18px;width:60%"></div>
      <div class="sk" style="height:14px;width:100%"></div>
      <div class="sk" style="height:14px;width:90%"></div>
      <div class="sk" style="height:14px;width:75%"></div>
    </div>
  `).join("");
  document.getElementById("newsContainer").innerHTML = `<div class="loading-grid">${skels}</div>`;
}

async function fetchAllNews() {
  const btn = document.getElementById("refreshBtn");
  btn.classList.add("spinning");
  showSkeletons();
  document.getElementById("statsBar").textContent = "Haberler yükleniyor...";

  const results = await Promise.allSettled(CHANNELS.map(c => fetchChannel(c)));
  allNews = results.flatMap(r => r.status === "fulfilled" ? r.value : []);
  allNews.sort((a, b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));

  btn.classList.remove("spinning");
  filterAndRender();

  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(fetchAllNews, 5 * 60 * 1000);
}

function filterAndRender() {
  const query = document.getElementById("searchInput").value.toLowerCase().trim();
  let filtered = allNews;

  if (activeChannel !== "all") {
    filtered = filtered.filter(n => n.channel.id === activeChannel);
  }

  if (query) {
    filtered = filtered.filter(n =>
      n.title.toLowerCase().includes(query) ||
      n.desc.toLowerCase().includes(query)
    );
  }

  document.getElementById("statsBar").textContent =
    filtered.length === 0 ? "Haber bulunamadı" :
    `${filtered.length} haber · Son güncelleme: ${new Date().toLocaleTimeString("tr-TR", { hour: "2-digit", minute: "2-digit" })}`;

  const container = document.getElementById("newsContainer");

  if (filtered.length === 0) {
    container.innerHTML = `<div class="placeholder">Aradığınız kriterlere uygun haber bulunamadı.</div>`;
    return;
  }

  container.innerHTML = `<div class="grid">${filtered.map(n => {
    const ch = n.channel;
    const badgeBg = dark ? ch.darkBg : ch.bg;
    const badgeColor = dark ? ch.darkColor : ch.color;
    return `
      <a class="card" href="${n.link || "#"}" target="_blank" rel="noopener noreferrer">
        <div class="card-top">
          <span class="badge" style="background:${badgeBg};color:${badgeColor}">${ch.name}</span>
          <span class="card-time">${timeAgo(n.pubDate)}</span>
        </div>
        <div class="card-title">${n.title}</div>
        ${n.desc ? `<div class="card-desc">${n.desc}</div>` : ""}
        ${n.link ? `<div class="card-footer">Devamını oku →</div>` : ""}
      </a>
    `;
  }).join("")}</div>`;
}

renderChannelButtons();
fetchAllNews();
</script>
</body>
</html>
